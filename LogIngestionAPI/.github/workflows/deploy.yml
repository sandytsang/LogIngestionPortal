name: Deploy LogIngestionAPI

# Portable deployment workflow.
#
# This file is meant to run from a repository whose ROOT is this LogIngestionAPI
# folder (for example, the folder you get when you unzip the portal's download
# bundle and push it as your own repo). GitHub only runs workflows found in
# .github/workflows at the repository root, so paths below (infra/, function/,
# scripts/) are relative to this folder.
#
# This workflow deploys the full stack (Function App + table + DCR). To refresh
# just the table + DCR after a columns.json change without touching the Function
# App, use the separate update-columns.yml workflow instead.
#
# This workflow uses the native path only: Bicep + Azure/functions-action.
#
# One-time setup (see README "Deploy from your own GitHub"):
#   1. Create an Entra app registration with a federated credential for this repo.
#   2. Add repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
#   3. Give that identity Contributor (+ User Access Administrator for the DCR
#      role assignment) on the target subscription/resource group.

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: 'Target resource group (created if missing)'
        type: string
        default: rg-logingestion
      functionAppName:
        description: 'Exact Function App name (no hash; globally unique). Updated in place if it already exists.'
        type: string
        default: func-logingestion
      workspaceName:
        description: 'Exact Log Analytics workspace name (created if missing, updated in place if it exists).'
        type: string
        default: log-logingestion
      dcrName:
        description: 'Exact Data Collection Rule name (created if missing, updated in place if it exists).'
        type: string
        default: dcr-logingestion
      dcrResourceGroup:
        description: 'Resource group for the Data Collection Rule (blank = same as target resource group)'
        type: string
        default: ''
      workspaceResourceGroup:
        description: 'Resource group of the Log Analytics workspace (blank = same as target resource group)'
        type: string
        default: ''
      location:
        description: 'Azure region'
        type: string
        default: eastus
      workspaceLocation:
        description: 'Region for the Log Analytics workspace (blank = same as the Function App region)'
        type: string
        default: ''
      functionPlanType:
        description: 'Hosting plan'
        type: choice
        options: [Consumption, Flex]
        default: Consumption
      requireEntraDevice:
        description: 'Validate device against its Entra record (needs Graph Device.Read.All granted separately)'
        type: boolean
        default: true
      skipRoleAssignment:
        description: 'Do not create the resource group role assignment (use when the login identity only has Contributor; grant Monitoring Metrics Publisher separately)'
        type: boolean
        default: true

permissions:
  id-token: write   # required for OIDC (passwordless) Azure login
  contents: read

# Run the bundled JavaScript actions (checkout, azure/login, azure/cli) on
# Node.js 24. Their current pinned versions still ship a Node 20 entrypoint,
# which the runner deprecated; opting in here silences the warning and matches
# the runner default from June 16th, 2026 onward.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Branch-based OIDC: the token subject is repo:<owner>/<repo>:ref:refs/heads/<branch>,
    # so a single "Branch" federated credential covers this and update-columns.yml.
    # To require manual approval per environment, add `environment: ${{ inputs.environment }}`
    # here and register an "Environment" federated credential instead.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create \
              --name "${{ inputs.resourceGroup }}" \
              --location "${{ inputs.location }}" \
              --output none

      - name: Deploy infrastructure (Bicep)
        id: infra
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            params=(
              location="${{ inputs.location }}"
              functionAppName="${{ inputs.functionAppName }}"
              workspaceName="${{ inputs.workspaceName }}"
              dcrName="${{ inputs.dcrName }}"
              functionPlanType="${{ inputs.functionPlanType }}"
              jwtRequireEntraDevice=${{ inputs.requireEntraDevice }}
            )
            tenantId=$(az account show --query tenantId --output tsv)
            if [ -n "$tenantId" ]; then
              params+=( jwtAllowedTenantId="$tenantId" )
            fi
            # Put the workspace in its own resource group when one was provided.
            if [ -n "${{ inputs.workspaceResourceGroup }}" ]; then
              params+=( workspaceResourceGroup="${{ inputs.workspaceResourceGroup }}" )
            fi
            # Create the workspace in its own region when one was provided.
            if [ -n "${{ inputs.workspaceLocation }}" ]; then
              params+=( workspaceLocation="${{ inputs.workspaceLocation }}" )
            fi
            # Put the DCR in its own resource group when the portal selected one.
            if [ -n "${{ inputs.dcrResourceGroup }}" ]; then
              params+=( dcrResourceGroup="${{ inputs.dcrResourceGroup }}" )
            fi
            # Contributor-only login: skip the resource group role assignment
            # (grant it separately). Contributor cannot create role assignments.
            if [ "${{ inputs.skipRoleAssignment }}" = "true" ]; then
              params+=( assignDcrPublisherRole=false )
            fi
            outputs=$(az deployment group create \
              --resource-group "${{ inputs.resourceGroup }}" \
              --name "logapi-$(date +%Y%m%d%H%M%S)" \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam \
              --parameters "${params[@]}" \
              --query properties.outputs \
              --output json)
            appName=$(echo "$outputs" | jq -r '.functionAppName.value // empty')
            principalId=$(echo "$outputs" | jq -r '.functionPrincipalId.value // empty')
            dcrRg=$(echo "$outputs" | jq -r '.dcrResourceGroup.value // empty')
            roleId=$(echo "$outputs" | jq -r '.monitoringMetricsPublisherRoleId.value // empty')
            echo "Function App: ${appName:-<unchanged>}"
            echo "functionAppName=$appName" >> "$GITHUB_OUTPUT"
            echo "functionPrincipalId=$principalId" >> "$GITHUB_OUTPUT"
            echo "dcrResourceGroup=$dcrRg" >> "$GITHUB_OUTPUT"
            echo "monitoringMetricsPublisherRoleId=$roleId" >> "$GITHUB_OUTPUT"

      - name: Publish function code
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infra.outputs.functionAppName }}
          package: function

      - name: Validate post-deploy permissions (native)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            fail=0

            principalId="${{ steps.infra.outputs.functionPrincipalId }}"
            dcrRg="${{ steps.infra.outputs.dcrResourceGroup }}"
            roleId="${{ steps.infra.outputs.monitoringMetricsPublisherRoleId }}"
            subId=$(az account show --query id --output tsv)

            if [ -z "$principalId" ]; then
              echo "::error::Could not resolve Function managed identity principalId from deployment outputs."
              exit 1
            fi
            if [ -z "$dcrRg" ]; then
              dcrRg="${{ inputs.dcrResourceGroup }}"
            fi
            if [ -z "$dcrRg" ]; then
              dcrRg="${{ inputs.resourceGroup }}"
            fi

            # Validate Graph Device.Read.All when Entra device validation is enabled.
            if [ "${{ inputs.requireEntraDevice }}" = "true" ]; then
              graphRoleId="7438b122-aefc-4978-80ed-43db9fcc7715"
              graphAssignment=$(az rest --method GET \
                --uri "https://graph.microsoft.com/v1.0/servicePrincipals/$principalId/appRoleAssignments" \
                --query "value[?appRoleId=='$graphRoleId'] | [0].id" \
                --output tsv 2>/dev/null || true)
              if [ -z "$graphAssignment" ]; then
                echo "::error::Missing Graph Device.Read.All for Function managed identity."
                echo "Run manually (Cloud Shell):"
                echo "  MI=\"$principalId\""
                echo "  GRAPH_SP=\$(az ad sp list --filter \"appId eq '00000003-0000-0000-c000-000000000000'\" --query '[0].id' -o tsv)"
                echo "  ROLE=\"7438b122-aefc-4978-80ed-43db9fcc7715\""
                echo "  az rest --method POST --uri \"https://graph.microsoft.com/v1.0/servicePrincipals/\$MI/appRoleAssignments\" --headers 'Content-Type=application/json' --body \"{\\\"principalId\\\":\\\"\$MI\\\",\\\"resourceId\\\":\\\"\$GRAPH_SP\\\",\\\"appRoleId\\\":\\\"\$ROLE\\\"}\""
                fail=1
              fi
            fi

            # Validate Monitoring Metrics Publisher assignment on the DCR RG.
            if [ -z "$roleId" ]; then
              roleId="3913510d-42f4-4e42-8a64-420c390055eb"
            fi
            scope="/subscriptions/$subId/resourceGroups/$dcrRg"
            roleDefinitionId="/subscriptions/$subId/providers/Microsoft.Authorization/roleDefinitions/$roleId"
            roleAssignment=$(az role assignment list \
              --assignee-object-id "$principalId" \
              --scope "$scope" \
              --query "[?roleDefinitionId=='$roleDefinitionId'] | [0].id" \
              --output tsv 2>/dev/null || true)
            if [ -z "$roleAssignment" ]; then
              echo "::error::Missing Monitoring Metrics Publisher on DCR resource group '$dcrRg'."
              echo "Run manually (Cloud Shell):"
              echo "  az account set --subscription $subId"
              echo "  az role assignment create --assignee-object-id $principalId --assignee-principal-type ServicePrincipal --role 'Monitoring Metrics Publisher' --scope '/subscriptions/$subId/resourceGroups/$dcrRg'"
              fail=1
            fi

            if [ "$fail" -ne 0 ]; then
              echo "::error::Post-deploy permission validation failed. See manual remediation commands above."
              exit 1
            fi
            echo "Post-deploy permission validation passed."

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "### LogIngestionAPI deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource group: ${{ inputs.resourceGroup }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: ${{ inputs.location }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plan: ${{ inputs.functionPlanType }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- JWT tenant pin: auto (current Azure tenant)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If \`requireEntraDevice\` is true, grant the Function's managed identity Graph **Device.Read.All** once (scripts/AssignMSIPermisison.ps1), then copy the function key + URL from the Azure portal into your Intune script." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If \`skipRoleAssignment\` was true, also grant the Function's managed identity **Monitoring Metrics Publisher** on the DCR's resource group (the deploy.ps1 log prints the exact \`az role assignment create\` command)." >> "$GITHUB_STEP_SUMMARY"

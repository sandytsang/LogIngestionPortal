name: Validate LogIngestionAPI

# Lightweight PR/push gate — no Azure credentials needed.
# Runs from a repo whose root is this LogIngestionAPI folder (the download
# bundle layout). Compiles the Bicep and sanity-checks the table schema.

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra/**'
      - 'schema/**'
      - 'function/**'
  pull_request:
    paths:
      - 'infra/**'
      - 'schema/**'
      - 'function/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Bicep (lint + compile)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: az bicep build --file infra/main.bicep

      - name: Validate schema/columns.json
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $validTypes = @('string','int','long','real','boolean','datetime','dynamic','guid')
          $schema = Get-Content 'schema/columns.json' -Raw | ConvertFrom-Json

          # Accept both the multi-table shape { tables: [...] } and a single
          # legacy { tableName, description, columns } object.
          $tables = if ($schema.PSObject.Properties.Name -contains 'tables') { $schema.tables } else { @($schema) }
          if (-not $tables -or $tables.Count -eq 0) { throw 'No tables found in schema/columns.json.' }

          $errors = @()
          foreach ($t in $tables) {
            if (-not $t.tableName) { $errors += 'A table is missing tableName.'; continue }
            if ($t.tableName -notmatch '_CL$') { $errors += "Table '$($t.tableName)' must end with _CL." }
            if (-not $t.columns -or $t.columns.Count -eq 0) { $errors += "Table '$($t.tableName)' has no columns." ; continue }

            $hasTimeGenerated = $false
            foreach ($c in $t.columns) {
              if (-not $c.name) { $errors += "Table '$($t.tableName)' has a column with no name." ; continue }
              if ($validTypes -notcontains $c.type) {
                $errors += "Table '$($t.tableName)' column '$($c.name)' has invalid type '$($c.type)'."
              }
              if ($c.name -eq 'TimeGenerated') {
                $hasTimeGenerated = $true
                if ($c.type -ne 'datetime') { $errors += "Table '$($t.tableName)' TimeGenerated must be datetime." }
              }
            }
            if (-not $hasTimeGenerated) { $errors += "Table '$($t.tableName)' must include a TimeGenerated (datetime) column." }

            $dupes = $t.columns.name | Group-Object | Where-Object Count -gt 1
            foreach ($d in $dupes) { $errors += "Table '$($t.tableName)' has duplicate column '$($d.Name)'." }
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error::$_" }
            throw "Schema validation failed with $($errors.Count) error(s)."
          }
          Write-Host "OK - $($tables.Count) table(s) validated."
